<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CryptoFinanceMarkets</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-brand"><div class="auth-brand-logo">CFM<span>.</span></div></div>
      <h1 class="auth-headline">Welcome<br/>Back to <span>CFM</span></h1>
      <p class="auth-subtext">Access your portfolio, track earnings, and manage your crypto investments — all in one place.</p>
      <div class="auth-stats">
        <div><div class="auth-stat-value">$2.4B+</div><div class="auth-stat-label">Assets Managed</div></div>
        <div><div class="auth-stat-value">50K+</div><div class="auth-stat-label">Investors</div></div>
        <div><div class="auth-stat-value">30%</div><div class="auth-stat-label">Max Monthly ROI</div></div>
      </div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-form-box">
      <h2>Sign In</h2>
      <p>Enter your credentials to access your account</p>
      <div class="auth-error" id="authError"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:.5rem">Sign In</button>
      <div class="auth-footer-text">Don't have an account? <a href="signup.html">Create one free</a></div>
    </div>
  </div>
</div>
<script src="assets/js/app.js"></script>
<script>
  if (window.CFM.getToken()) window.location.href = 'dashboard.html';
  const errEl = document.getElementById('authError');
  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const data = await window.CFM.apiFetch('/api/auth/login', { method:'POST', body: JSON.stringify({ email, password }) });
      window.CFM.setAuth(data.token, data.user);
      window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    } catch(e) {
      errEl.textContent = e.message || 'Invalid email or password.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
